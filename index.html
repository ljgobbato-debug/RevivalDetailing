<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revival Detailing (Editable Clone)</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;text-align:center}
header{padding:20px;background:#111;border-bottom:1px solid gold}
h1{color:gold}
section{padding:40px 20px}
.card{background:#141414;margin:15px auto;padding:20px;border-radius:10px;max-width:900px}
img{max-width:300px;margin:10px;border-radius:10px}
button{padding:10px 15px;margin:10px;background:gold;border:none;cursor:pointer}
input,textarea{padding:10px;margin:5px;width:80%;max-width:400px}
.admin{background:#000;padding:20px;border-top:2px solid gold}
</style>
</head>

<body>

<header>
<h1 contenteditable="true" id="title">Revival Detailing</h1>
<p contenteditable="true" id="subtitle">Premium Car Detailing Service</p>
</header>

<section>
<div class="card">
<h2 contenteditable="true" id="servicesTitle">Services</h2>
<p contenteditable="true" id="servicesText">Full Detail - $150 | Interior - $75 | Wash - $25</p>
</div>
</section>

<section>
<div class="card">
<h2>Gallery</h2>
<input type="file" id="upload" multiple>
<div id="gallery"></div>
</div>
</section>

<section>
<div class="card">
<h2 contenteditable="true" id="reviewsTitle">Reviews</h2>
<p contenteditable="true" id="reviewsText">"Amazing work!" ⭐⭐⭐⭐⭐</p>
</div>
</section>

<section>
<div class="card">
<h2 contenteditable="true" id="contactTitle">Contact</h2>
<p contenteditable="true" id="contactText">Phone: 123-456-7890</p>
</div>
</section>

<div class="admin">
<h2>Admin Controls (Auto-Saves)</h2>
<button onclick="saveContent()">Save Changes</button>
<button onclick="clearImages()">Clear Images</button>
</div>

<script>
// LOAD SAVED TEXT
window.onload = () => {
  const ids = ['title','subtitle','servicesTitle','servicesText','reviewsTitle','reviewsText','contactTitle','contactText'];
  ids.forEach(id => {
    if(localStorage.getItem(id)){
      document.getElementById(id).innerText = localStorage.getItem(id);
    }
  });

  const images = JSON.parse(localStorage.getItem('images')) || [];
  images.forEach(src => addImage(src));
};

// SAVE TEXT
function saveContent(){
  const ids = ['title','subtitle','servicesTitle','servicesText','reviewsTitle','reviewsText','contactTitle','contactText'];
  ids.forEach(id => {
    localStorage.setItem(id, document.getElementById(id).innerText);
  });
  alert('Saved!');
}

// IMAGE UPLOAD
const upload = document.getElementById('upload');
upload.addEventListener('change', () => {
  const files = upload.files;
  let images = JSON.parse(localStorage.getItem('images')) || [];

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e){
      images.push(e.target.result);
      localStorage.setItem('images', JSON.stringify(images));
      addImage(e.target.result);
    };
    reader.readAsDataURL(file);
  });
});

function addImage(src){
  const img = document.createElement('img');
  img.src = src;
  document.getElementById('gallery').appendChild(img);
}

function clearImages(){
  localStorage.removeItem('images');
  document.getElementById('gallery').innerHTML = '';
}
</script>

</body>
</html>
